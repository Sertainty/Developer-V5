  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ate-rows: 0.86in 1fr 0.42in;\n    grid-template-columns: 2.45in 1fr;\n    overflow: hidden;\n  }\n\n  /* HEADER */\n  .header {\n    grid-column: 1 / -1;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 0 0.42in;\n    border-bottom: 2px solid var(--pink);\n  }\n  .header img { height: 0.34in; display: block; }\n  .header-right { text-align: right; }\n  .doc-kicker {\n    font-size: 8pt; font-weight: 700; letter-spacing: 0.13em;\n    text-transform: uppercase; color: var(--teal);\n  }\n  .doc-title { font-size: 11pt; font-weight: 900; color: var(--ink); letter-spacing: -0.01em; }\n  .doc-sub { font-size: 7.5pt; color: var(--ink-3); font-weight: 400; margin-top: 1px; }\n\n  /* SIDEBAR */\n  .sidebar {\n    grid-column: 1; grid-row: 2;\n    background: var(--surface);\n    border-right: 1px solid var(--rule);\n    padding: 0.22in 0.24in;\n    display: flex; flex-direction: column; gap: 10px;\n  }\n\n  .version-row { display: flex; align-items: center; justify-content: space-between; }\n  .version-pill {\n    display: inline-flex; align-items: center;\n    font-size: 9pt; font-weight: 900; padding: 5px 15px; border-radius: 20px;\n    background: var(--pink); color: var(--white); letter-spacing: 0.06em;\n  }\n  .version-date { font-size: 7.5pt; color: var(--ink-3); font-weight: 500; }\n\n  .sb-block {\n    background: var(--white); border: 1px solid var(--rule);\n    border-radius: 9px; padding: 10px 12px;\n  }\n  .section-label {\n    font-size: 7pt; font-weight: 700; letter-spacing: 0.12em;\n    text-transform: uppercase; color: var(--peach);\n    margin-bottom: 7px; padding-bottom: 5px; border-bottom: 1px solid var(--rule);\n  }\n  .kv { display: flex; flex-direction: column; gap: 6px; }\n  .kv-row { display: flex; flex-direction: column; gap: 1px; }\n  .kv-row .k {\n    display: flex; align-items: center; gap: 7px;\n    font-size: 8pt; font-weight: 700; color: var(--ink);\n  }\n  .kv-row .k::before {\n    content: ''; width: 6px; height: 6px; border-radius: 2px;\n    background: var(--teal); flex-shrink: 0;\n  }\n  .kv-row .v { font-size: 7.5pt; color: var(--ink-3); padding-left: 13px; line-height: 1.4; }\n\n  .compliance-strip { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }\n  .chip {\n    font-size: 6.5pt; font-weight: 700; letter-spacing: 0.04em;\n    padding: 3px 8px; border-radius: 5px; background: #e3f4f0; color: #1a7a6c;\n    white-space: nowrap;\n  }\n  .chip.pk { background: #fde7eb; color: #c0223e; }\n  .chip.pe { background: #fdeae4; color: #b65437; }\n\n  .migrate-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }\n  .migrate-list li {\n    font-size: 7.5pt; color: var(--ink-2); line-height: 1.4;\n    padding-left: 13px; position: relative;\n  }\n  .migrate-list li::before {\n    content: '→'; position: absolute; left: 0; top: 0;\n    color: var(--peach); font-weight: 700;\n  }\n  .migrate-list code {\n    font-family: 'VT323', monospace; font-size: 9pt; color: var(--purple);\n    background: #f2eef6; padding: 0 3px; border-radius: 3px;\n  }\n\n  .contact { font-size: 7pt; color: var(--ink-2); line-height: 1.55; }\n  .contact a { color: var(--teal); text-decoration: none; }\n  .contact .ck {\n    font-size: 6.5pt; font-weight: 700; letter-spacing: 0.08em;\n    text-transform: uppercase; color: var(--ink-3); display: block; margin-top: 6px;\n  }\n  .contact .ck:first-child { margin-top: 0; }\n\n  /* MAIN */\n  .main {\n    grid-column: 2; grid-row: 2;\n    padding: 0.26in 0.4in 0.12in 0.3in;\n    display: flex; flex-direction: column; gap: 7px;\n  }\n\n  /* HERO */\n  .hero {\n    background: linear-gradient(135deg, #15202b 0%, #18283a 55%, #102028 100%);\n    border-radius: 11px; padding: 10px 22px; color: var(--white);\n    position: relative; overflow: hidden;\n  }\n  .hero-eyebrow {\n    font-size: 7pt; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;\n    color: rgba(255,255,255,0.5); margin-bottom: 7px;\n  }\n  .hero h1 {\n    font-size: 19pt; font-weight: 900; font-style: italic; line-height: 1.12;\n    margin-bottom: 6px; position: relative; z-index: 1; max-width: 100%; white-space: nowrap;\n  }\n  .hero p {\n    font-size: 8.5pt; color: rgba(255,255,255,0.8); line-height: 1.55;\n    position: relative; z-index: 1; max-width: 94%;\n  }\n  .hero p strong { color: #fff; font-weight: 700; }\n  .hero-badges { display: flex; gap: 6px; margin-top: 11px; flex-wrap: wrap; position: relative; z-index: 1; }\n  .badge {\n    font-size: 6.5pt; font-weight: 500; letter-spacing: 0.03em; padding: 4px 10px;\n    border-radius: 20px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.92);\n    border: 0.5px solid rgba(255,255,255,0.2);\n  }\n\n  .block-title {\n    font-size: 7.5pt; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;\n    color: var(--ink); margin-bottom: 5px; display: flex; align-items: center; gap: 9px;\n  }\n  .block-title::after { content: ''; flex: 1; height: 1px; background: var(--rule); }\n\n  /* CORE OBJECTS */\n  .objects { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; }\n  .obj {\n    border: 1px solid var(--rule); border-radius: 9px; padding: 9px 11px 10px;\n    position: relative; background: var(--white);\n  }\n  .obj::before {\n    content: ''; position: absolute; top: 0; left: 14px; right: 14px; height: 3px;\n    border-radius: 0 0 3px 3px;\n  }\n  .obj.o1::before { background: var(--pink); }\n  .obj.o2::before { background: var(--teal); }\n  .obj.o3::before { background: var(--blue); }\n  .obj .otag {\n    font-family: 'VT323', monospace; font-size: 10pt; font-weight: 400;\n    margin-bottom: 3px; display: inline-block;\n  }\n  .obj.o1 .otag { color: var(--pink); }\n  .obj.o2 .otag { color: var(--teal); }\n  .obj.o3 .otag { color: var(--blue); }\n  .obj h3 { font-size: 9pt; font-weight: 900; color: var(--ink); margin-bottom: 4px; }\n  .obj p { font-size: 7.5pt; color: var(--ink-2); line-height: 1.45; }\n\n  /* QUICKSTART */\n  .qs-wrap { display: flex; align-items: stretch; gap: 0; }\n  .qs {\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex: 1;\n  }\n  .qs-step {\n    border: 1px solid var(--rule); border-radius: 9px; padding: 8px 10px 9px;\n    background: var(--surface); position: relative;\n  }\n  .qs-num {\n    width: 21px; height: 21px; border-radius: 50%;\n    background: linear-gradient(135deg, var(--pink), var(--peach));\n    color: #fff; font-size: 8.5pt; font-weight: 900;\n    display: flex; align-items: center; justify-content: center; margin-bottom: 7px;\n  }\n  .qs-step h4 { font-size: 8pt; font-weight: 700; color: var(--ink); margin-bottom: 3px; line-height: 1.2; }\n  .qs-step p { font-size: 7pt; color: var(--ink-3); line-height: 1.4; }\n  .qs-step .t { font-size: 6.5pt; font-weight: 700; color: var(--teal); margin-top: 5px; display: block; }\n\n  /* CAPABILITIES */\n  .caps { display: flex; gap: 22px; align-items: flex-start; }\n  .cap-col { flex: 1; display: flex; flex-direction: column; gap: 9px; }\n  .cap { display: flex; gap: 10px; align-items: flex-start; }\n  .cap-dot {\n    width: 9px; height: 9px; border-radius: 2px; margin-top: 3px; flex-shrink: 0;\n    transform: rotate(45deg);\n  }\n  .cap-col:first-child .cap:nth-child(1) .cap-dot { background: var(--purple); }\n  .cap-col:first-child .cap:nth-child(2) .cap-dot { background: var(--blue); }\n  .cap-col:first-child .cap:nth-child(3) .cap-dot { background: var(--green); }\n  .cap-col:first-child .cap:nth-child(4) .cap-dot { background: var(--pink); }\n  .cap-col:last-child .cap:nth-child(1) .cap-dot { background: var(--pink); }\n  .cap-col:last-child .cap:nth-child(2) .cap-dot { background: var(--yellow); }\n  .cap-col:last-child .cap:nth-child(3) .cap-dot { background: var(--teal); }\n  .cap-col:last-child .cap:nth-child(4) .cap-dot { background: var(--blue); }\n  .cap-col:last-child .cap:nth-child(5) .cap-dot { background: var(--purple); }\n  .cap h4 { font-size: 8pt; font-weight: 700; color: var(--ink); margin-bottom: 2px; }\n  .cap p { font-size: 7.5pt; color: var(--ink-2); line-height: 1.32; hyphens: none; -webkit-hyphens: none; overflow-wrap: normal; }\n  .cap p + p { margin-top: 6px; }\n  .cap ul { font-size: 7.5pt; color: var(--ink-2); line-height: 1.4; list-style: disc; padding-left: 1.05em; margin-top: 2px; }\n  .cap ul li { margin-bottom: 1px; }\n\n  /* FOOTER */\n  .footer {\n    grid-column: 1 / -1; grid-row: 3; border-top: 1px solid var(--rule);\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 0.42in; font-size: 7pt; color: var(--ink-3);\n  }\n  .footer .tags { display: flex; align-items: center; gap: 8px; }\n\n  @media print {\n    html, body { background: #fff; padding: 0; }\n    .page { box-shadow: none; margin: 0; }\n    @page { size: letter; margin: 0; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"page\">\n\n  <header class=\"header\">\n    <img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMkAAAA1CAYAAADrls9nAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAAyaADAAQAAAABAAAANQAAAACsWWI6AAAXcElEQVR4Ae1dCXgUVbY+1Xs6IQESyCKJgoOAoCwDjjgg38imILvIp6LDuOPzc1Se+4K743N0nOc8PwKIiqiIouAMIKCMSoKRJQhhC8gWViGJLNl6ve8/1alOVXUn6U46GUyqPk7udu5Sp+5f55x7bzVExmVIwJCAIQFDAoYEDAkYEjAkYEjAkIAhgVYggdXfbRElpWdFK7jVFn2LB3efEDmL81vVczQ1xxNduGKdmPfZ9/TyXz+n0hIDKM0h86bo48DeE2LVh3m0O3cP5X2Q22qA0uQg+WDVOrH4m23kFzb6+aSL/vbKF3SqtKzVCLgpJut/os3DRcVi3bJ8SrB4qY1d0LH1e2jL/G9axXNsUpDM/XKtWJwDgJCVyGSX6djRCnrj+aV02gDKf2KuN6jPE8dKxLacH6m91UPJDj+1tQMoNh+Vfr+DCuetavFAaTKQzF79nfjnxp3kA0AEA8RsA0iYrPTzkTJ689klBlAaNGWbt9LpkhJxdOtW6mDzUIrDR+3tPoDER0lWL8WDzuRsoX2z/9WigdIkIJn1NQCymQFiAUAADDNrERsJMwBjCcRPHDpLb838jE6XGKZX8077yHurPFUiynYXUDI0CAMk2eGldgwSaJFEmx+ml5/iQGX/3kQH3/q8xQIl5iB5JzdPLN26k7ySGeCwkARgSAhZg5gAEMliAyGEZjl5+CxlP7PYAErk87ZZOd0HtpHT5KZ4+CEyWf3khPZwImRwxAEoHNqtgsq/2khH313RIoESU5C8nZcnFm0pIJ/JBA1iIT+AIJgkaA8raxFoFQaJ1QbA2MgMntKi0zT3qU8NoDTr dows<\u002Fspan><span class=\"v\">x64 · code-signed binaries<\u002Fspan><\u002Fdiv>\n        <div class=\"kv-row\"><span class=\"k\">macOS<\u002Fspan><span class=\"v\">Apple Silicon (ARM64) only<\u002Fspan><\u002Fdiv>\n        <div class=\"kv-row\"><span class=\"k\">Languages<\u002Fspan><span class=\"v\">UXL · C · C++<\u002Fspan><\u002Fdiv>\n        <div class=\"kv-row\"><span class=\"k\">Roadmap<\u002Fspan><span class=\"v\">C# · iOS · Android · Industrial IoT<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sb-block\">\n      <div class=\"section-label\">Crypto &amp; Compliance<\u002Fdiv>\n      <div class=\"kv\">\n        <div class=\"kv-row\"><span class=\"k\">AES-256<\u002Fspan><span class=\"v\">FIPS 140-3 validated · CMVP certificate<\u002Fspan><\u002Fdiv>\n        <div class=\"kv-row\"><span class=\"k\">Resilience<\u002Fspan><span class=\"v\">Dynamic scheme — quantum &amp; AI resistant, no PKI<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"compliance-strip\">\n        <span class=\"chip\">FIPS 140-3<\u002Fspan>\n        <span class=\"chip pe\">ECCN 5D002<\u002Fspan>\n        <span class=\"chip pk\">AES-256<\u002Fspan>\n        <span class=\"chip\">No PKI<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sb-block\">\n      <div class=\"section-label\">Migrating to V5.0<\u002Fdiv>\n      <ul class=\"migrate-list\">\n        <li>New license required — V4 licenses do not load<\u002Fli>\n        <li>Sertainty <strong>Agent removed<\u002Fstrong><\u002Fli>\n        <li>API signatures changed — see release notes for details<\u002Fli>\n        <li>Global SSO &amp; SMS-via-email removed<\u002Fli>\n        <li>Pre-5.0 objects still open; 5.0 objects won't open in V4<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div class=\"sb-block contact\">\n      <div class=\"section-label\">Contact &amp; Links<\u002Fdiv>\n      <span class=\"ck\">Address<\u002Fspan>\n      51 Century Blvd, Suite 100<br>Nashville, TN 37214\n      <span class=\"ck\">Web<\u002Fspan>\n      <a href=\"https://www.sertainty.com\">www.sertainty.com<\u002Fa>\n      <span class=\"ck\">Releases<\u002Fspan>\n      <a href=\"https://github.com/Sertainty\">github.com/Sertainty<\u002Fa>\n    <\u002Fdiv>\n\n  <\u002Faside>\n\n  <main class=\"main\">\n\n    <div class=\"hero\">\n      <div class=\"hero-eyebrow\">active · intelligent · data<\u002Fdiv>\n      <h1>Data that protects itself<\u002Fh1>\n      <p>The Sertainty UXP Technology embeds <strong>active intelligence<\u002Fstrong> inside a protected object, preventing unauthorized access no matter where the data resides. Unlike conventional encryption, it constructs dynamic protection schemes that resist quantum systems and AI data-mining engines — securing data at rest, in flight, and in process.<\u002Fp>\n      <div class=\"hero-badges\">\n        <span class=\"badge\">Active Intelligence<\u002Fspan>\n        <span class=\"badge\">Self-Protecting Files<\u002Fspan>\n        <span class=\"badge\">Zero Trust Architecture<\u002Fspan>\n        <span class=\"badge\">Offline by Default<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div class=\"block-title\">Three core objects<\u002Fdiv>\n      <div class=\"objects\">\n        <div class=\"obj o1\">\n          <span class=\"otag mono\">UXP Identity · .iic<\u002Fspan>\n          <h3>Who can open<\u002Fh3>\n          <p>Authenticates a user, machine, or workgroup via challenge/response. Your credentials — treat like a private key, never share.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"obj o2\">\n          <span class=\"otag mono\">UXP Object · .uxp<\u002Fspan>\n          <h3>What is protected<\u002Fh3>\n          <p>A self-enforcing container holding files, folders, or SQL data behind an embedded policy. The payload — safe to share anywhere.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"obj o3\">\n          <span class=\"otag mono\">SmartMessage<\u002Fspan>\n          <h3>Peer-to-peer payload<\u002Fh3>\n          <p>A protected in-memory or on-disk message for direct exchange between identities — no containing file required.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div class=\"block-title\">First round-trip in ~60 minutes<\u002Fdiv>\n      <div class=\"qs-wrap\">\n        <div class=\"qs\">\n          <div class=\"qs-step\">\n            <div class=\"qs-num\">1<\u002Fdiv>\n            <h4>Install &amp; license<\u002Fh4>\n            <p>Drop <span class=\"mono\" style=\"color:var(--purple)\">sertainty.lic<\u002Fspan> in the standard location.<\u002Fp>\n            <span class=\"t\">~5 min<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"qs-step\">\n            <div class=\"qs-num\">2<\u002Fdiv>\n            <h4>Create an Identity<\u002Fh4>\n            <p>Define challenge pairs, privileges &amp; optional machine ID.<\u002Fp>\n            <span class=\"t\">~10 min<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"qs-step\">\n            <div class=\"qs-num\">3<\u002Fdiv>\n            <h4>Package a UXP<\u002Fh4>\n            <p>Seal files with access rules, time-locks &amp; geo-fences.<\u002Fp>\n            <span class=\"t\">~10 min<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"qs-step\">\n            <div class=\"qs-num\">4<\u002Fdiv>\n            <h4>Authenticate &amp; extract<\u002Fh4>\n            <p>Satisfy the challenge loop; audit events written automatically.<\u002Fp>\n            <span class=\"t\">~15 min<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1; display:flex; flex-direction:column;\">\n      <div class=\"block-title\">Key capabilities<\u002Fdiv>\n      <div class=\"caps\">\n        <div class=\"cap-col\">\n          <div class=\"cap\"><span class=\"cap-dot\"><\u002Fspan><div><h4>Selective &amp; partial access<\u002Fh4><ul><li><em>Who<\u002Fem> can read what — selective access governs page-level reach.<\u002Fli><li><em>How much<\u002Fem> is unprotected — only the portion in use, at runtime.<\u002Fli><li><em>How long<\u002Fem> plaintext exists — decrypted just in time, released after use.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n          <div class=\"cap\"><span class=\"cap-dot\"><\u002Fspan><div><h4>Active Intelligence, Active Authorization<\u002Fh4><p>Every open triggers a fresh evaluation against the embedded rules: identity, time, location, device, and prior failures.<\u002Fp><p>Access is never unconditional.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"cap\"><span class=\"cap-dot\"><\u002Fspan><div><h4>UXP SQL<\u002Fh4><p>SQLite-compatible relational data lives inside the UXP, with every query gated by the same Identity and rules that protect the file payload.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"cap\"><span class=\"cap-dot\"><\u002Fspan><div><h4>Identity embedded at creation<\u002Fh4><p>No external key store. The access policy is compiled into the UXP object at creation and travels with it.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cap-col\">\n          <div class=\"cap\"><span class=\"cap-dot\"><\u002Fspan><div><h4>Offline by default. Airgap ready.<\u002Fh4><ul><li>No server, key manager, or network is needed for access decisions.<\u002Fli><li>UXP runs identically in connected and airgapped environments.<\u002Fli><li>Network features are opt-in.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n          <div class=\"cap\"><span class=\"cap-dot\"><\u002Fspan><div><h4>Audit log &amp; SIEM<\u002Fh4><p>Logging is a preference set by the data owner. When the UXP is online, access events can be sent to a server through several outbound methods, ready for ingest by a SIEM or other monitoring tool. Storing the audit log inside the UXP itself is also an option.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"cap\"><span class=\"cap-dot\"><\u002Fspan><div><h4>Self-destruct &amp; Alternate Reality<\u002Fh4><p>Configurable defensive responses when access conditions fail: shred the contents, expose decoy data, or revoke the file silently.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div class=\"cap\"><span class=\"cap-dot\"><\u002Fspan><div><h4>Delegate access without re-protecting<\u002Fh4><p>Authorize and revoke users dynamically through the Delegate Service, without rebuilding or redistributing the UXP.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n\n  <footer class=\"footer\">\n    <span>© 2026 Sertainty Corporation · 51 Century Blvd, Suite 100, Nashville, TN<\u002Fspan>\n    <span class=\"tags\">\n      <span class=\"chip pk\">SDK v5.0<\u002Fspan>\n      <span class=\"chip\">FIPS 140-3<\u002Fspan>\n      <span class=\"chip pe\">ECCN 5D002<\u002Fspan>\n    <\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
